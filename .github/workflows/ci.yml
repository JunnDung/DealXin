name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api prisma:generate

      - name: Debug Prisma output
        run: |
          echo "=== Node version ==="
          node --version
          echo "=== pnpm version ==="
          pnpm --version
          echo "=== Prisma client location ==="
          ls -la node_modules/.prisma/client/ 2>/dev/null || echo "NOT FOUND at node_modules/.prisma/client/"
          echo "=== node_modules @prisma/client ==="
          ls -la node_modules/@prisma/client/ 2>/dev/null || echo "NOT FOUND at node_modules/@prisma/client/"
          echo "=== @prisma/client index ==="
          cat node_modules/@prisma/client/index.d.ts 2>/dev/null | head -5 || echo "index.d.ts not found"
          echo "=== Checking .prisma path ==="
          find node_modules -name ".prisma" -type d 2>/dev/null | head -5

      - name: Typecheck API
        run: pnpm --filter api typecheck
        continue-on-error: false

      - name: Typecheck Web
        run: pnpm --filter web typecheck
        continue-on-error: false

      - name: Lint Web
        run: pnpm --filter web lint
        continue-on-error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api prisma:generate

      - name: Build API
        run: pnpm --filter api build
        continue-on-error: false

      - name: Build Web
        run: pnpm --filter web build
        continue-on-error: false

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api prisma:generate

      - name: Run tests
        run: pnpm test
        continue-on-error: true
